name: Revisar procesos atrasados

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

jobs:
  check-overdue:
    runs-on: ubuntu-latest

    steps:
      - name: Llamar endpoint de MAESTRO
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl --silent --show-error \
            --write-out "\n%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://maestro-destiladora.space/api/push/check-overdue)

          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n 1)

          echo "Respuesta de MAESTRO:"
          echo "$body"
          echo "Código HTTP: $status"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "La revisión de notificaciones falló."
            exit 1
          fi